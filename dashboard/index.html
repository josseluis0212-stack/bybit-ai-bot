<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC AI Bot Terminal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="/app/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #060606;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
        }
        .accent-glow {
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.1);
        }
        .neon-text-green { color: #00ff9d; text-shadow: 0 0 15px rgba(0, 255, 157, 0.4); }
        .neon-text-red { color: #ff4d4d; text-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-lg mx-auto pb-24">
    
    <!-- Header Premium -->
    <header class="flex justify-between items-center mb-8">
        <div class="animate-float">
            <h1 class="text-3xl font-bold tracking-tighter">SMC <span class="neon-text-green">TERMINAL</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] font-black flex items-center mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-2 pulse"></span> INSTITUTIONAL CLOUD
            </p>
        </div>
        <div class="glass p-4 accent-glow">
            <i data-lucide="cpu" class="w-6 h-6 text-green-400"></i>
        </div>
    </header>

    <!-- Metrics Grid -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="glass p-5 relative overflow-hidden">
            <div class="absolute -top-4 -right-4 w-16 h-16 bg-green-500/5 rounded-full blur-2xl"></div>
            <span class="text-gray-500 text-[10px] uppercase font-bold tracking-wider">Balance Total</span>
            <div class="text-3xl font-bold mt-1" id="wallet-balance">---</div>
            <span class="text-[10px] text-green-400 font-bold mt-1 flex items-center">
                <i data-lucide="arrow-up-right" class="w-3 h-3 mr-1"></i> +2.4%
            </span>
        </div>
        
        <!-- PnL Multi-Timeframe Card -->
        <div class="glass p-5 relative overflow-hidden">
            <div class="absolute -top-4 -right-4 w-16 h-16 bg-blue-500/5 rounded-full blur-2xl"></div>
            <div class="flex justify-between items-start mb-2">
                <span class="text-gray-500 text-[10px] uppercase font-bold tracking-wider">Desempeño PnL</span>
                <span class="text-[9px] text-gray-500 font-mono" id="last-update">--:--:--</span>
            </div>
            
            <div class="grid grid-cols-2 gap-x-4 gap-y-2">
                <div>
                    <span class="text-[9px] text-gray-400 uppercase">Diario</span>
                    <div class="text-md font-bold" id="pnl-daily">---</div>
                    <div class="text-[8px] text-gray-500" id="wr-daily">WR: --%</div>
                </div>
                <div>
                    <span class="text-[9px] text-gray-400 uppercase">Semanal</span>
                    <div class="text-md font-bold" id="pnl-weekly">---</div>
                    <div class="text-[8px] text-gray-500" id="wr-weekly">WR: --%</div>
                </div>
                <div class="pt-1 border-t border-white/5">
                    <span class="text-[9px] text-gray-400 uppercase">Mensual</span>
                    <div class="text-md font-bold" id="pnl-monthly">---</div>
                    <div class="text-[8px] text-gray-500" id="wr-monthly">WR: --%</div>
                </div>
                <div class="pt-1 border-t border-white/5">
                    <span class="text-[9px] text-gray-400 uppercase">Total</span>
                    <div class="text-md font-bold text-green-400" id="pnl-total">---</div>
                    <div class="text-[8px] text-gray-500" id="wr-total">WR: --%</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Secondary Metrics -->
    <section class="glass p-6 mb-8 relative overflow-hidden">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center mr-3">
                    <i data-lucide="layers" class="w-5 h-5 text-gray-400"></i>
                </div>
                <div>
                    <div class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Capacidad de Trading</div>
                    <div class="text-sm font-bold"><span id="active-count">0</span> / 10 <span class="text-gray-600 font-normal">Posiciones</span></div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Apalancamiento</div>
                <div class="text-sm font-bold text-green-400" id="leverage-val">--x</div>
            </div>
        </div>
        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
            <div id="capacity-bar" class="h-full bg-green-500 transition-all duration-1000" style="width: 0%"></div>
        </div>
    </section>

    <!-- Active Trades Section -->
    <div class="mb-4 flex justify-between items-end">
        <div>
            <h2 class="text-xl font-bold tracking-tight text-white/90">Monitor Maestro</h2>
            <p class="text-[10px] text-gray-500 font-bold">FLUJO INSTITUCIONAL EN VIVO</p>
        </div>
    </div>

    <div id="trades-container" class="space-y-4 mb-8">
        <!-- Trades dynamic content -->
        <div class="glass p-6 text-center animate-pulse">
            <div class="w-8 h-8 border-2 border-green-500/30 border-t-green-500 rounded-full animate-spin mx-auto mb-3"></div>
            <span class="text-gray-500 text-xs font-bold tracking-widest uppercase">Escaneando Mercados...</span>
        </div>
    </div>

    <!-- PWA Bottom Navigation (Modern Floating) -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass p-2 flex justify-around items-center z-50 accent-glow bg-black/60 border-t border-white/10">
        <button class="flex flex-col items-center p-2 text-green-400 transition-transform active:scale-90">
            <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
            <span class="text-[8px] font-bold uppercase tracking-tighter">Terminal</span>
        </button>
        <button class="flex flex-col items-center p-2 text-gray-500 transition-transform active:scale-90 opacity-40">
            <i data-lucide="bar-chart-3" class="w-6 h-6 mb-1"></i>
            <span class="text-[8px] font-bold uppercase tracking-tighter">Analítica</span>
        </button>
        <button class="flex flex-col items-center p-2 text-gray-500 transition-transform active:scale-90 opacity-40">
            <i data-lucide="history" class="w-6 h-6 mb-1"></i>
            <span class="text-[8px] font-bold uppercase tracking-tighter">Historial</span>
        </button>
        <button class="flex flex-col items-center p-2 text-gray-500 transition-transform active:scale-90 opacity-40">
            <i data-lucide="settings" class="w-6 h-6 mb-1"></i>
            <span class="text-[8px] font-bold uppercase tracking-tighter">Config</span>
        </button>
    </div>

    <script>
        function formatPnL(val, elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            const sign = val >= 0 ? '+' : '';
            el.innerText = sign + '$' + Math.abs(val).toFixed(2);
            el.className = 'text-md font-bold ' + (val >= 0 ? 'neon-text-green' : 'neon-text-red');
        }

        async function updateDashboard() {
            try {
                // Status Update
                const statusRes = await fetch('/api/status');
                const statusData = await statusRes.json();
                
                const balance = statusData.balance.length > 0 ? 
                    parseFloat(statusData.balance[0].walletBalance).toFixed(2) : '0.00';
                
                document.getElementById('wallet-balance').innerText = '$' + balance;
                document.getElementById('leverage-val').innerText = statusData.leverage + 'x';
                document.getElementById('active-count').innerText = statusData.active_trades_count;
                
                // Capacidad progress bar
                const capacityPct = (statusData.active_trades_count / 10) * 100;
                document.getElementById('capacity-bar').style.width = capacityPct + '%';

                // Performance Update
                const perfRes = await fetch('/api/performance');
                const perfData = await perfRes.json();
                
                formatPnL(perfData.daily.pnl, 'pnl-daily');
                document.getElementById('wr-daily').innerText = 'WR: ' + perfData.daily.wr.toFixed(0) + '%';
                
                formatPnL(perfData.weekly.pnl, 'pnl-weekly');
                document.getElementById('wr-weekly').innerText = 'WR: ' + perfData.weekly.wr.toFixed(0) + '%';
                
                formatPnL(perfData.monthly.pnl, 'pnl-monthly');
                document.getElementById('wr-monthly').innerText = 'WR: ' + perfData.monthly.wr.toFixed(0) + '%';
                
                formatPnL(perfData.total.pnl, 'pnl-total');
                document.getElementById('wr-total').innerText = 'WR: ' + perfData.total.wr.toFixed(0) + '%';
                
                // Trades Update
                const tradesRes = await fetch('/api/trades');
                const tradesData = await tradesRes.json();
                
                const container = document.getElementById('trades-container');
                container.innerHTML = '';
                
                if (tradesData.length === 0) {
                    container.innerHTML = '<div class="glass p-10 text-center text-gray-600 font-bold uppercase tracking-widest text-xs italic">A la espera de liquidez institucional...</div>';
                }

                tradesData.forEach(trade => {
                    const isProfit = (trade.pnl_usdt || 0) >= 0;
                    const pnlColor = isProfit ? 'neon-text-green' : 'neon-text-red';
                    
                    const card = `
                        <div class="glass p-6 relative overflow-hidden group transition-all duration-300 hover:bg-white/[0.04] border-l-4 ${trade.status === 'OPEN' ? 'border-green-500' : 'border-gray-800'}">
                            <div class="flex justify-between items-center relative z-10">
                                <div>
                                    <div class="flex items-center">
                                        <span class="font-black text-xl tracking-tighter">${trade.symbol}</span>
                                        <span class="ml-3 text-[9px] bg-white/5 border border-white/10 px-2 py-0.5 rounded-full uppercase font-black text-gray-400 tracking-widest">${trade.side}</span>
                                    </div>
                                    <div class="flex items-center mt-1">
                                        <span class="w-1.5 h-1.5 ${trade.status === 'OPEN' ? 'bg-green-500 pulse' : 'bg-gray-700'} rounded-full mr-2"></span>
                                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-tight">${trade.status === 'OPEN' ? 'Ejecutando en Cloud' : 'Operación Finalizada'}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs text-gray-500 font-black uppercase tracking-tighter mb-1">${trade.status === 'CLOSED' ? 'Resultado PnL' : 'Entrada'}</div>
                                    <div class="text-xl font-black ${trade.status === 'CLOSED' ? pnlColor : 'text-white'}">
                                        ${trade.status === 'CLOSED' ? (trade.pnl_usdt > 0 ? '+' : '') + trade.pnl_usdt.toFixed(2) : trade.entry.toFixed(4)}
                                    </div>
                                    <div class="text-[10px] font-black ${trade.status === 'CLOSED' ? pnlColor : 'text-gray-500'}">
                                        ${trade.status === 'CLOSED' ? trade.pnl_pct.toFixed(2) + '%' : 'Market Order'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                lucide.createIcons();
            } catch (error) {
                console.error('Error dashboard sync:', error);
            }
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
        lucide.createIcons();
    </script>
</body>
</html>
