services:
  - type: web
    name: quantum-bot-bybit
    env: docker
    region: fra
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: TIMEFRAME
        value: "5m"
      - key: RISK_PER_TRADE
        value: "8.0"
      - key: MAX_OPEN_TRADES
        value: "10"
      - key: LEVERAGE
        value: "10"
      - key: ENTRY_ORDER_MAX_AGE
        value: "180"
      - key: MIN_VOLUME_24H
        value: "100000000"
      - key: USE_TELEGRAM
        value: "true"
