services:
  - type: web
    name: lrmc-pro-bot
    env: python
    region: frankfurt          # EU — no USA
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    healthCheckPath: /health
    envVars:
      - key: BYBIT_API_KEY
        sync: false             # Se configura manualmente en Render dashboard
      - key: BYBIT_API_SECRET
        sync: false             # Se configura manualmente en Render dashboard
      - key: BYBIT_DEMO
        value: "True"           # Cambiar a False cuando vayas a live
      - key: TELEGRAM_BOT_TOKEN
        value: "8363627370:AAE-1MphxrahFrRkgOSjBn_KnUYEJBL4cb0"
      - key: TELEGRAM_CHAT_ID
        value: "7840645929"
      - key: LEVERAGE
        value: "10"
      - key: TRADE_AMOUNT_USDT
        value: "20"
      - key: MAX_CONCURRENT_TRADES
        value: "2"              # LRMC PRO: máximo 2 simultáneas
      - key: PROXY_URL
        value: ""
      - key: KILLZONE_FILTER
        value: "False"          # LRMC no usa killzones
      - key: HTF_CONFLUENCE
        value: "False"          # LRMC usa estructura pura M5
